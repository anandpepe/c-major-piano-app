<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YB's Training Box</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(17, 24, 39, 0.78);
      --panel-strong: rgba(15, 23, 42, 0.92);
      --border: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #ef4444;
      --accent-2: #38bdf8;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.28);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(239, 68, 68, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.14), transparent 28%),
        linear-gradient(180deg, #0b1020 0%, #111827 100%);
    }

    .shell {
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      min-height: calc(100vh - 112px);
      align-items: center;
    }
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .course-card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 360px;
      padding: 24px;
      border-radius: 26px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(17, 24, 39, 0.86));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .course-card::before {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 70%);
      opacity: 0.6;
      pointer-events: none;
    }

    .course-card.training::after,
    .course-card.ear::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
    }

    .course-card.training::after {
      background: linear-gradient(135deg, rgba(239,68,68,0.5), transparent 45%);
    }

    .course-card.ear::after {
      background: linear-gradient(135deg, rgba(56,189,248,0.5), transparent 45%);
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #e2e8f0;
      z-index: 1;
    }

    .course-title {
      margin: 18px 0 10px;
      font-size: 32px;
      line-height: 1.05;
      letter-spacing: -0.03em;
      z-index: 1;
    }

    .course-desc {
      display: none;
    }

    .pill-row {
      display: none;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      color: #dbeafe;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .course-footer {
      margin-top: auto;
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      z-index: 1;
    }

    .status {
      display: none;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 138px;
      padding: 14px 18px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 800;
      transition: transform .18s ease, opacity .18s ease, background .18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button.primary {
      background: var(--accent);
      color: white;
    }

    .button.secondary {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .footer-note {
      display: none;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
        min-height: auto;
      }
    }

      .hero {
        padding: 28px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 14px 14px 40px;
      }

      .course-title {
        font-size: 28px;
      }

      .course-footer {
        flex-direction: column;
        align-items: start;
      }

      .button {
        width: 100%;
      }
    }

      .hero {
        padding: 22px;
        border-radius: 24px;
      }

      .section-head {
        flex-direction: column;
        align-items: start;
      }

      .course-title {
        font-size: 28px;
      }

      .course-footer {
        flex-direction: column;
        align-items: start;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="grid">
      <article class="course-card training">
        <div class="badge">Harmony Course</div>
        <h3 class="course-title">C Major 8-Bar<br />Progression Explorer</h3>
        <div class="course-footer">
          <a class="button primary" href="./c-major-progression-explorer.html">Enter Course →</a>
        </div>
      </article>

      <article class="course-card ear">
        <div class="badge">Ear Training Course</div>
        <h3 class="course-title">Ear Training</h3>
        <div class="course-footer">
          <a class="button secondary" href="./ear-training.html">Open Course →</a>
        </div>
      </article>
    </section>
  </div>
</body>
</html>
